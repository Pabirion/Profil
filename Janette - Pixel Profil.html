<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Janette — Pixel Profil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#131318; --wood:#4a4a53; --woodLt:#6e6e79; --woodDk:#26262d;
    --parch:#3b3b43; --parch2:#323239; --inset:#34343c; --socket:#cabfa9;
    --cream:#5a5a65; --textDk:#ece7db;
    --q-common:#dcd6c8; --q-uncommon:#5db85d; --q-rare:#4a8fd6; --q-epic:#b074d4; --q-legendary:#f0922e;
    --class:#e09ccb;
    --gold:#ecb74a; --green:#7fd06a;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:transparent;
    font-family:'VT323', monospace;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
    image-rendering:pixelated;
  }
  /* faint pixel stars in the backdrop */
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:0;
    background-image:
      radial-gradient(1px 1px at 12% 22%, #fff6 99%, transparent),
      radial-gradient(1px 1px at 78% 14%, #fff5 99%, transparent),
      radial-gradient(1px 1px at 40% 9%, #fff4 99%, transparent),
      radial-gradient(1px 1px at 64% 30%, #fff4 99%, transparent),
      radial-gradient(1px 1px at 26% 40%, #fff3 99%, transparent),
      radial-gradient(1px 1px at 90% 44%, #fff4 99%, transparent),
      radial-gradient(1px 1px at 6% 58%, #fff2 99%, transparent),
      radial-gradient(1px 1px at 33% 18%, #fff2 99%, transparent),
      radial-gradient(1px 1px at 54% 6%, #fff3 99%, transparent),
      radial-gradient(1px 1px at 70% 52%, #fff2 99%, transparent),
      radial-gradient(1px 1px at 86% 24%, #fff3 99%, transparent),
      radial-gradient(1px 1px at 18% 70%, #fff2 99%, transparent);
  }

  #viewport{ position:relative; }
  #stage{
    width:1000px; height:1000px; position:relative;
    transform-origin:center center;
  }

  /* ===== WINDOW ===== */
  .window{
    position:absolute; inset:30px;
    background:
      linear-gradient(180deg,#3d3d45,#2e2e34);
    border:3px solid var(--ink);
    box-shadow:
      inset 0 0 0 3px var(--woodLt),
      inset 0 0 0 6px var(--wood),
      inset 0 0 0 9px var(--woodDk),
      inset 0 0 0 12px var(--cream),
      0 0 0 3px var(--woodDk),
      0 14px 0 4px #00000040,
      0 28px 60px #00000055;
    display:flex; flex-direction:column;
    padding:18px 16px 14px;
  }

  /* ===== TITLE BAR ===== */
  .titlebar{
    display:flex; align-items:center; gap:14px;
    padding:6px 6px 12px;
    border-bottom:3px solid #55555f;
    position:relative;
  }
  .orb{
    width:74px; height:74px; flex:0 0 auto; position:relative;
    border-radius:50%;
    background:#2c1b12;
    box-shadow:
      0 0 0 3px var(--gold), 0 0 0 6px var(--woodDk),
      inset 0 0 0 3px #00000080;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .orb canvas{ width:108px; height:108px; image-rendering:pixelated; margin-top:6px; }
  .orb::after{ /* glossy shine */
    content:""; position:absolute; top:6px; left:12px; width:22px; height:14px;
    background:#ffffff33; border-radius:50%; transform:rotate(-18deg);
  }
  .name-block{ flex:1 1 auto; min-width:0; }
  .charname{
    font-family:'Pixelify Sans', sans-serif; font-weight:700;
    font-size:34px; color:var(--textDk); line-height:1;
    text-shadow:2px 2px 0 #00000088, 3px 3px 0 #00000044;
    letter-spacing:1px;
  }
  .subline{ margin-top:6px; font-size:22px; color:#b3aea1; letter-spacing:.5px; }
  .subline .lvl{ color:#dbc28c; }
  .subline .cls{ color:var(--class); font-weight:700; }
  .subline .guild{ color:#86bd9e; }

  .winbtns{ display:flex; gap:6px; align-self:flex-start; }
  .winbtn{
    width:26px; height:26px; border:2px solid var(--ink);
    font-family:'Silkscreen'; font-size:12px; color:#ece7db;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    box-shadow: inset 1px 1px 0 #ffffff55, inset -1px -1px 0 #00000055;
  }
  .winbtn.min{ background:#7a8a5a; }
  .winbtn.close{ background:#b6473b; }
  .winbtn:hover{ filter:brightness(1.12); }

  /* ===== BODY GRID ===== */
  .body{
    flex:1 1 auto; display:grid;
    grid-template-columns:96px 1fr 96px;
    gap:18px; padding:16px 4px 8px; min-height:0;
  }
  .col{ display:flex; flex-direction:column; justify-content:space-between; align-items:center; gap:10px; }

  /* ===== SLOTS ===== */
  .slot{
    width:88px; height:88px; position:relative; cursor:pointer;
    background:var(--inset);
    border:3px solid var(--q,#7a4a28);
    box-shadow: inset 2px 2px 0 #ffffff66, inset -2px -2px 0 #00000033;
    transition: transform .05s, filter .08s;
  }
  .col .slot{ width:88px; height:88px; }
  .slot .socket{
    position:absolute; inset:5px; background:var(--socket);
    box-shadow: inset 2px 2px 0 #00000040, inset -1px -1px 0 #ffffff55;
    display:flex; align-items:center; justify-content:center;
  }
  .slot .pix-icon{ width:60px; height:60px; image-rendering:pixelated; }
  .slot .qbadge{
    position:absolute; bottom:-3px; right:-3px;
    font-family:'Silkscreen'; font-size:11px; color:#f3eee2;
    background:var(--q,#7a4a28); border:2px solid var(--ink);
    padding:0 3px; line-height:14px;
  }
  .slot:hover{ transform:translate(-2px,-2px); filter:brightness(1.07); z-index:5; }
  .slot:hover::before{
    content:""; position:absolute; inset:-3px; border:3px solid var(--gold);
    box-shadow:0 0 12px var(--gold); pointer-events:none;
  }

  /* ===== CENTER STAGE ===== */
  .stage-center{ display:flex; flex-direction:column; gap:12px; min-height:0; }
  .scene{
    flex:1 1 auto; position:relative; overflow:hidden;
    border:3px solid var(--ink);
    box-shadow: inset 0 0 0 3px #00000055, inset 0 0 0 6px #f7ecd055;
    background:
      linear-gradient(180deg,#3a2f6e 0%, #5a4a92 32%, #9466a6 54%, #c77fae 65%, #e09bba 70%,
        #7d6fc4 70%, #5a4ba0 100%);
  }
  .cloud{ position:absolute; background:#fff7; border-radius:40px; filter:contrast(1); }
  .cloud.c1{ width:90px; height:24px; top:28px; left:38px; box-shadow:18px 8px 0 -4px #fff7; }
  .cloud.c2{ width:64px; height:20px; top:58px; right:46px; box-shadow:-14px 7px 0 -3px #fff6; }
  .sun{ position:absolute; top:34px; right:64px; width:40px; height:40px; border-radius:50%;
        background:radial-gradient(circle,#fff3c8,#ffd98a); box-shadow:0 0 22px #ffe6a8aa; }
  .floorline{ position:absolute; left:0; right:0; top:70%; height:3px; background:#4a3d86; opacity:.5; }
  /* subtle dusk stars, confined to the upper sky */
  .skystars{ position:absolute; left:0; right:0; top:0; height:66%; pointer-events:none; opacity:.55;
    background-image:
      radial-gradient(1px 1px at 8% 14%, #ffffffcc 99%, transparent),
      radial-gradient(1px 1px at 19% 32%, #ffffff99 99%, transparent),
      radial-gradient(1px 1px at 27% 8%, #fff8 99%, transparent),
      radial-gradient(1px 1px at 36% 24%, #ffffffaa 99%, transparent),
      radial-gradient(1px 1px at 44% 12%, #fff7 99%, transparent),
      radial-gradient(1px 1px at 52% 30%, #ffffff99 99%, transparent),
      radial-gradient(1px 1px at 61% 6%, #fff8 99%, transparent),
      radial-gradient(1px 1px at 68% 20%, #ffffffbb 99%, transparent),
      radial-gradient(1px 1px at 74% 36%, #fff7 99%, transparent),
      radial-gradient(1px 1px at 83% 10%, #ffffffaa 99%, transparent),
      radial-gradient(1px 1px at 90% 26%, #fff8 99%, transparent),
      radial-gradient(1px 1px at 96% 16%, #ffffff99 99%, transparent),
      radial-gradient(1px 1px at 13% 46%, #fff6 99%, transparent),
      radial-gradient(1px 1px at 58% 44%, #fff6 99%, transparent),
      radial-gradient(1px 1px at 79% 50%, #fff5 99%, transparent);
  }
  .skystars .twkl{ position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
    box-shadow:0 0 3px #fff; animation:twk 4.2s ease-in-out infinite; }
  .skystars .twkl.a{ top:18%; left:23%; animation-delay:.4s; }
  .skystars .twkl.b{ top:11%; left:66%; animation-delay:1.7s; }
  .skystars .twkl.c{ top:30%; left:48%; animation-delay:2.9s; }
  @keyframes twk{ 0%,100%{ opacity:.15; transform:scale(.7);} 50%{ opacity:.9; transform:scale(1);} }
  /* shooting star — fires every 10s */
  .shooter{ position:absolute; top:10%; left:78%; width:60px; height:2px; pointer-events:none;
    opacity:0; transform:rotate(20deg);
    background:linear-gradient(90deg, transparent, #ffffffdd);
    box-shadow:0 0 6px #ffffffaa;
    animation:shoot 10s linear infinite; }
  .shooter::after{ content:""; position:absolute; right:0; top:-1px; width:3px; height:3px;
    border-radius:50%; background:#fff; box-shadow:0 0 6px #fff; }
  @keyframes shoot{
    0%   { opacity:0; transform:translate(0,0) rotate(20deg); }
    2%   { opacity:0; }
    4%   { opacity:1; }
    11%  { opacity:1; transform:translate(-180px,68px) rotate(20deg); }
    13%  { opacity:0; transform:translate(-180px,68px) rotate(20deg); }
    100% { opacity:0; transform:translate(-180px,68px) rotate(20deg); }
  }
  .charcanvas{
    position:absolute; left:50%; bottom:8%;
    transform:translateX(-50%);
    height:78%; width:auto; image-rendering:pixelated;
    animation:bob 3.4s ease-in-out infinite;
  }
  @keyframes bob{ 0%,100%{ transform:translate(-50%,0); } 50%{ transform:translate(-50%,-2.2%); } }
  .footshadow{
    position:absolute; left:50%; bottom:7.5%; transform:translateX(-50%);
    width:46%; height:3.2%; background:#241a4a55; border-radius:50%;
    filter:blur(1px);
  }
  .spark{ position:absolute; width:4px; height:4px; background:#fff6c8; pointer-events:none;
          box-shadow:0 0 6px #fff6c8; animation:tw 2.6s ease-in-out infinite; }
  .spark.s1{ top:30%; left:30%; animation-delay:.2s; }
  .spark.s2{ top:24%; right:34%; animation-delay:1.1s; }
  .spark.s3{ top:44%; right:26%; animation-delay:1.8s; }
  @keyframes tw{ 0%,100%{ opacity:0; transform:scale(.6);} 50%{ opacity:1; transform:scale(1);} }

  .rotateBtn{
    position:absolute; bottom:8px; left:50%; transform:translateX(-50%);
    font-family:'Silkscreen'; font-size:11px; color:#ece7db;
    background:#00000066; border:2px solid #f7ecd088; padding:2px 8px; cursor:pointer;
    letter-spacing:1px;
  }
  .rotateBtn:hover{ background:#000000aa; }

  .weapons{ display:flex; gap:14px; justify-content:center; }
  .weapons .slot{ width:84px; height:84px; }

  /* ===== REPUTATION VIEW ===== */
  .repview{ display:none; flex:1 1 auto; flex-direction:column; gap:0; padding:6px 10px;
    overflow:hidden; }
  .repview.active{ display:flex; }
  .body.rep .col, .body.rep .stage-center{ display:none; }
  .body.rep{ display:block; }
  .rep-title{ font-family:'Pixelify Sans'; font-weight:700; font-size:24px; color:var(--textDk);
    margin:2px 2px 12px; text-shadow:1px 1px 0 #0006; }
  .rep-row{ margin-bottom:14px; }
  .rep-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .rep-name{ font-family:'Pixelify Sans'; font-size:20px; color:#ded8cc; }
  .rep-standing{ font-family:'Silkscreen'; font-size:12px; letter-spacing:.5px; }
  .rep-bar{ height:18px; background:#3a2c1f; border:2px solid var(--ink);
    box-shadow:inset 1px 1px 0 #00000066; position:relative; }
  .rep-fill{ height:100%; box-shadow:inset 0 2px 0 #ffffff55; }
  .rep-val{ position:absolute; right:6px; top:50%; transform:translateY(-50%);
    font-family:'Silkscreen'; font-size:11px; color:#fff; text-shadow:1px 1px 0 #0008; }

  /* ===== FOOTER ===== */
  .footer{ padding:8px 6px 2px; border-top:3px solid #55555f; }
  .xpwrap{ display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .xplabel{ font-family:'Silkscreen'; font-size:12px; color:#b3aea1; letter-spacing:.5px; white-space:nowrap; }
  .xpbar{ flex:1; height:20px; background:#3a2c1f; border:2px solid var(--ink);
    box-shadow:inset 1px 1px 0 #00000066; position:relative; overflow:hidden; }
  .xpfill{ height:100%; width:72%; background:linear-gradient(180deg,#a6d77a,#5e9c3e);
    box-shadow:inset 0 3px 0 #c8f09a; }
  .xptext{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-family:'Silkscreen'; font-size:11px; color:#fff; text-shadow:1px 1px 0 #0009; letter-spacing:1px; }
  .tabs{ display:flex; gap:8px; }
  .tab{
    font-family:'Pixelify Sans'; font-weight:600; font-size:18px; color:#b3aea1; 
    padding:5px 18px 6px; cursor:pointer; letter-spacing:.5px;
    background:#3a3a42; border:2px solid var(--ink);
    box-shadow: inset 1px 1px 0 #ffffff22, inset -1px -1px 0 #00000055;
  }
  .tab.active{ background:linear-gradient(180deg,#52525c,#3f3f47); color:var(--gold);
    box-shadow: inset 1px 1px 0 #ffffff33, inset 0 -3px 0 var(--gold); }
  .tab:hover{ filter:brightness(1.06); }

  /* ===== TOOLTIP ===== */
  #tooltip{
    position:fixed; z-index:100; pointer-events:none; display:none;
    min-width:210px; max-width:280px;
    background:#1d140c; border:2px solid var(--q,#888);
    box-shadow:0 0 0 2px #000, 0 6px 0 #00000055, 0 0 18px #0008;
    padding:9px 11px; color:#e9ddc4; font-family:'VT323'; font-size:19px; line-height:1.08;
  }
  #tooltip .tt-name{ font-family:'Pixelify Sans'; font-weight:600; font-size:20px; line-height:1.1; margin-bottom:2px; }
  #tooltip .tt-ilvl{ color:var(--gold); }
  #tooltip .tt-bind{ color:#e9ddc4; }
  #tooltip .tt-row{ display:flex; justify-content:space-between; color:#cdbf9e; }
  #tooltip .tt-stat{ color:#fff; }
  #tooltip .tt-equip{ color:#5fdd57; margin-top:3px; }
  #tooltip .tt-desc{ color:var(--gold); font-style:italic; margin-top:4px; }
  #tooltip .tt-req{ color:#bdb094; margin-top:3px; }
  #tooltip hr{ border:none; border-top:1px solid #ffffff18; margin:5px 0; }

  .q-common{ color:var(--q-common);} .q-uncommon{ color:var(--q-uncommon);}
  .q-rare{ color:var(--q-rare);} .q-epic{ color:var(--q-epic);} .q-legendary{ color:var(--q-legendary);}
</style>
</head>
<body>
  <div id="viewport">
    <div id="stage">
      <div class="window" data-screen-label="Character Profile">
        <!-- TITLE BAR -->
        <div class="titlebar">
          <div class="orb"><canvas id="orb" width="40" height="40"></canvas></div>
          <div class="name-block">
            <div class="charname">Janette</div>
            <div class="subline">
              <span class="lvl">Level 27</span> ·
              <span class="cls">Senior UX Designer</span><br>
              <span class="guild">&lt;Pixel Pushers&gt;</span> · Studio of Aurora
            </div>
          </div>
          <div class="winbtns">
            <div class="winbtn min">_</div>
            <div class="winbtn close">X</div>
          </div>
        </div>

        <!-- BODY -->
        <div class="body" id="bodyGrid">
          <div class="col" id="colLeft"></div>

          <div class="stage-center">
            <div class="scene">
              <div class="skystars">
                <span class="twkl a"></span><span class="twkl b"></span><span class="twkl c"></span>
              </div>
              <div class="cloud c1"></div>
              <div class="cloud c2"></div>
              <div class="spark s1"></div>
              <div class="spark s2"></div>
              <div class="spark s3"></div>
              <div class="floorline"></div>
              <div class="footshadow"></div>
              <canvas class="charcanvas" id="char" width="120" height="150"></canvas>
              <div class="rotateBtn" id="rotate">◄  ROTATE  ►</div>
            </div>
            <div class="weapons" id="weapons"></div>
          </div>

          <div class="col" id="colRight"></div>

          <!-- Reputation view (hidden until tab switch) -->
          <div class="repview" id="repView"></div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
          <div class="xpwrap">
            <span class="xplabel">EXP</span>
            <div class="xpbar">
              <div class="xpfill" id="xpfill"></div>
              <div class="xptext">8 420 / 12 000 — rested</div>
            </div>
          </div>
          <div class="tabs">
            <div class="tab active" data-tab="character">Character</div>
            <div class="tab" data-tab="reputation">Reputation</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="tooltip"></div>

  <script src="icons.js?v=3"></script>
  <script src="pixel-art.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
